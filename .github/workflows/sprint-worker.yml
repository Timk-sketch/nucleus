name: Sprint Worker

on:
  workflow_dispatch:
    inputs:
      sprint:
        description: "Sprint number to build (e.g. 24)"
        required: true
        type: string
      dry_run:
        description: "Dry run (no API calls, no deploys)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  run-sprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Configure git
        run: |
          git config user.name "Nucleus Sprint Worker"
          git config user.email "worker@nucleus.app"

      - name: Install worker dependencies
        run: cd scripts/worker && npm install

      - name: Run sprint worker
        run: node scripts/worker/run-sprint.js ${{ github.event.inputs.sprint }} ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_NUCLEUS_WEBHOOK: ${{ secrets.SLACK_NUCLEUS_WEBHOOK }}
          NUCLEUS_STAGING_URL: ${{ secrets.NUCLEUS_STAGING_URL }}
          NUCLEUS_PROD_URL: https://nucleus-production.up.railway.app
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
