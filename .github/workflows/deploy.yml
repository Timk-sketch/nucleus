name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

# Staging auto-deploys via Railway's native GitHub integration when
# the sprint worker pushes to origin/staging — no webhook needed.
# Production deploys via Railway webhook after master CI passes.

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    steps:
      - name: Deploy to Railway Production
        run: |
          curl -s --fail -X POST "$RAILWAY_DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"branch":"master"}' || echo "Railway webhook not configured — skipping"
        env:
          RAILWAY_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
