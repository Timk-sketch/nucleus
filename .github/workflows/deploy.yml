name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy to Railway
        run: |
          curl -s --fail -X POST "$RAILWAY_DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"branch":"master"}' || echo "Railway webhook not configured — skipping"
        env:
          RAILWAY_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
