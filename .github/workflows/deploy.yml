name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [master, staging]
    types: [completed]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'staging' }}
    steps:
      - name: Deploy to Railway Staging
        run: |
          curl -s --fail -X POST "$RAILWAY_STAGING_DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"branch":"staging"}' || echo "Railway staging webhook not configured — skipping"
        env:
          RAILWAY_STAGING_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_STAGING_DEPLOY_WEBHOOK }}

  deploy-production:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' }}
    steps:
      - name: Deploy to Railway Production
        run: |
          curl -s --fail -X POST "$RAILWAY_DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"branch":"master"}' || echo "Railway webhook not configured — skipping"
        env:
          RAILWAY_DEPLOY_WEBHOOK: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}
