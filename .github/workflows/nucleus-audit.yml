name: Nucleus Code Audit (Weekly)

on:
  schedule:
    - cron: '0 9 * * 2'   # Tuesday 9 AM UTC
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Accept Claude trust dialog
        run: |
          echo '{"projects":{"/home/runner/work/nucleus/nucleus":{"hasTrustDialogAccepted":true}}}' > /home/runner/.claude.json

      - name: Run security audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NUCLEUS_SUPABASE_URL: ${{ secrets.NUCLEUS_SUPABASE_URL }}
          NUCLEUS_SUPABASE_SERVICE_KEY: ${{ secrets.NUCLEUS_SUPABASE_SERVICE_KEY }}
          SLACK_NUCLEUS_WEBHOOK: ${{ secrets.SLACK_NUCLEUS_WEBHOOK }}
        run: |
          npx -y @anthropic-ai/claude-code@latest \
            --dangerously-skip-permissions \
            -p "You are auditing the Nucleus C#/.NET 9 + Blazor WASM codebase. Do a thorough security and quality audit:
          1. Check all API controllers for missing [Authorize] on endpoints that should be protected
          2. Check all EF queries for missing TenantId filters (multi-tenancy breach risk)
          3. Check for SQL injection risks (raw SQL without parameterization)
          4. Check for hardcoded secrets or credentials
          5. Check that all migrations have RLS enabled where needed
          6. Check for any CORS misconfiguration in Program.cs
          7. Run dotnet build and report any warnings
          8. Run dotnet test and report results
          Report findings as CRITICAL / HIGH / MEDIUM / LOW.
          If SLACK_NUCLEUS_WEBHOOK is set, post a summary to Slack."
