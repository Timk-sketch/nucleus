version: "3.9"
services:
  nucleus-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NUCLEUS_DB_CONNECTION=${NUCLEUS_DB_CONNECTION}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY_MINUTES=60
      - JWT_REFRESH_EXPIRY_DAYS=30
      - ASPNETCORE_ENVIRONMENT=Development
